name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  detect-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_present: ${{ steps.detect.outputs.backend_present }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          if [ -f backend/pyproject.toml ]; then
            echo "backend_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_present=false" >> "$GITHUB_OUTPUT"
          fi

  # Fast checks - do not require Docker or PostgreSQL
  backend-quick-checks:
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_present == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -e .[dev]
      - name: Run Ruff linting
        run: python -m ruff check .
      - name: Run Ruff format check
        run: python -m ruff format --check .
      - name: Run mypy type checking
        run: python -m mypy .
      - name: Run unit tests (no DB)
        run: python -m pytest tests/unit/ -v

  # DB-dependent tests - require PostgreSQL
  backend-db-tests:
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_present == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Use PostgreSQL service container for DB-dependent tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finflow
          POSTGRES_PASSWORD: finflow
          POSTGRES_DB: finflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -e .[dev]
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U finflow; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      - name: Run integration tests (with PostgreSQL)
        run: python -m pytest tests/integration/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://finflow:finflow@localhost:5432/finflow_test

  no-backend-note:
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_present != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Backend not present yet
        run: echo "backend/pyproject.toml not present yet; backend test job skipped."
