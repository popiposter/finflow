name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

  backend-quick-checks:
    name: backend-quick-checks
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff mypy pytest pytest-asyncio pytest-cov asyncpg

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run MyPy
        run: mypy app

  backend-db-tests:
    name: backend-db-tests
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finflow
          POSTGRES_PASSWORD: finflow
          POSTGRES_DB: finflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finflow -d finflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://finflow:finflow@127.0.0.1:5432/finflow
      JWT_SECRET_KEY: test-secret-key
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: '30'
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: '7'
      DEBUG: 'false'
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff mypy pytest pytest-asyncio pytest-cov asyncpg

      - name: Run full backend test suite
        run: pytest tests/

  no-backend-note:
    name: no-backend-note
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No backend changes detected
        run: echo "No backend changes detected; backend CI jobs skipped."
