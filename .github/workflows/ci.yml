name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-backend:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
              - 'scripts/dev/**'
              - 'README.md'
              - 'IMPLEMENTATION.md'
              - 'CLAUDE.md'
              - 'docs/**'

  backend-quick-checks:
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --dev || python -m pip install -e . mypy pytest pytest-asyncio httpx asyncpg
      - name: Show tool versions
        run: |
          python --version
          mypy --version
          pytest --version
      - name: MyPy (pretty output)
        run: mypy . --show-error-codes --pretty

  backend-db-tests:
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/finflow_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --dev || python -m pip install -e . mypy pytest pytest-asyncio httpx asyncpg
      - name: Show tool versions
        run: |
          python --version
          pytest --version
      - name: Planned payments API focus
        run: pytest tests/api/test_planned_payments.py -vv -x --maxfail=1
      - name: Full backend test suite
        run: pytest tests/ -vv -x --maxfail=1 --durations=10 --junitxml=pytest-results.xml
      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/pytest-results.xml
          if-no-files-found: ignore

  no-backend-note:
    needs: detect-backend
    if: needs.detect-backend.outputs.backend_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No backend changes detected."
