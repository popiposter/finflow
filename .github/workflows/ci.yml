name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
              - 'scripts/dev/**'
              - 'README.md'
              - 'IMPLEMENTATION.md'
              - 'CLAUDE.md'
              - 'docs/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
              - 'README.md'
              - 'IMPLEMENTATION.md'

  backend-quick-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --extra dev
      - name: Show tool versions
        run: |
          python --version
          uv --version
          uv run python -m mypy --version
          uv run python -m pytest --version
      - name: MyPy (pretty output)
        run: uv run python -m mypy . --show-error-codes --pretty

  backend-db-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/finflow_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --extra dev
      - name: Show tool versions
        run: |
          python --version
          uv --version
          uv run python -m pytest --version
      - name: Planned payments API focus
        run: uv run python -m pytest tests/api/test_planned_payments.py -vv -x --maxfail=1
      - name: Full backend test suite
        run: uv run python -m pytest tests/ -vv -x --maxfail=1 --durations=10 --junitxml=pytest-results.xml
      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/pytest-results.xml
          if-no-files-found: ignore

  frontend-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Show tool versions
        run: |
          node --version
          npm --version
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:run
      - name: Production build
        run: npm run build

  no-backend-note:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No backend changes detected."

  no-frontend-note:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No frontend changes detected."
